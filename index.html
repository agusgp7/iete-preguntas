<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuestionario</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1, h2 {
      margin-top: 0;
      color: #1f4f82;
    }

    .section {
      margin-bottom: 35px;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #fafafa;
    }

    .question {
      margin-bottom: 18px;
      padding: 12px;
      background: white;
      border-radius: 10px;
      border: 1px solid #e4e4e4;
    }

    .question p {
      margin: 0 0 10px;
      font-weight: bold;
    }

    label {
      margin-right: 18px;
      cursor: pointer;
    }

    .matching-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      align-items: center;
      margin-bottom: 12px;
      padding: 10px;
      background: white;
      border: 1px solid #e4e4e4;
      border-radius: 10px;
    }

    .left-item {
      font-weight: bold;
    }

    select {
      width: 100%;
      padding: 9px;
      border-radius: 8px;
      border: 1px solid #bbb;
      font-size: 15px;
    }

    button {
      background: #1f4f82;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #16395d;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      background: #eef6ff;
      border: 1px solid #c8def5;
    }

    .correct {
      color: green;
      font-weight: bold;
      margin-top: 8px;
    }

    .incorrect {
      color: #c62828;
      font-weight: bold;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cuestionario de Preguntas</h1>

    <div class="section">
      <h2>Verdadero o Falso</h2>

      <div class="question" data-correct="V">
        <p>1. Montevideo es la capital de Uruguay.</p>
        <label><input type="radio" name="vf1" value="V"> Verdadero</label>
        <label><input type="radio" name="vf1" value="F"> Falso</label>
        <div class="feedback"></div>
      </div>

      <div class="question" data-correct="F">
        <p>2. El Sol gira alrededor de la Tierra.</p>
        <label><input type="radio" name="vf2" value="V"> Verdadero</label>
        <label><input type="radio" name="vf2" value="F"> Falso</label>
        <div class="feedback"></div>
      </div>

      <div class="question" data-correct="V">
        <p>3. El agua hierve a 100°C en condiciones normales.</p>
        <label><input type="radio" name="vf3" value="V"> Verdadero</label>
        <label><input type="radio" name="vf3" value="F"> Falso</label>
        <div class="feedback"></div>
      </div>
    </div>

    <div class="section">
      <h2>Emparejamiento de dos columnas</h2>

      <div class="matching-row" data-correct="París">
        <div class="left-item">Francia</div>
        <div>
          <select>
            <option value="">Seleccionar...</option>
            <option value="Madrid">Madrid</option>
            <option value="París">París</option>
            <option value="Roma">Roma</option>
          </select>
          <div class="feedback"></div>
        </div>
      </div>

      <div class="matching-row" data-correct="Madrid">
        <div class="left-item">España</div>
        <div>
          <select>
            <option value="">Seleccionar...</option>
            <option value="Madrid">Madrid</option>
            <option value="París">París</option>
            <option value="Roma">Roma</option>
          </select>
          <div class="feedback"></div>
        </div>
      </div>

      <div class="matching-row" data-correct="Roma">
        <div class="left-item">Italia</div>
        <div>
          <select>
            <option value="">Seleccionar...</option>
            <option value="Madrid">Madrid</option>
            <option value="París">París</option>
            <option value="Roma">Roma</option>
          </select>
          <div class="feedback"></div>
        </div>
      </div>
    </div>

    <button onclick="corregir()">Corregir</button>

    <div class="result" id="resultado" style="display:none;"></div>
  </div>

  <script>
    function corregir() {
      let total = 0;
      let correctas = 0;

      const vfQuestions = document.querySelectorAll('.question');
      vfQuestions.forEach(q => {
        total++;
        const correct = q.dataset.correct;
        const selected = q.querySelector('input[type="radio"]:checked');
        const feedback = q.querySelector('.feedback');

        if (selected && selected.value === correct) {
          correctas++;
          feedback.innerHTML = '<div class="correct">Correcto</div>';
        } else {
          feedback.innerHTML = '<div class="incorrect">Incorrecto. Respuesta correcta: ' + (correct === 'V' ? 'Verdadero' : 'Falso') + '</div>';
        }
      });

      const matchingRows = document.querySelectorAll('.matching-row');
      matchingRows.forEach(row => {
        total++;
        const correct = row.dataset.correct;
        const selected = row.querySelector('select').value;
        const feedback = row.querySelector('.feedback');

        if (selected === correct) {
          correctas++;
          feedback.innerHTML = '<div class="correct">Correcto</div>';
        } else {
          feedback.innerHTML = '<div class="incorrect">Incorrecto. Respuesta correcta: ' + correct + '</div>';
        }
      });

      const resultado = document.getElementById('resultado');
      resultado.style.display = 'block';
      resultado.textContent = `Obtuviste ${correctas} de ${total} respuestas correctas.`;
    }
  </script>
</body>
</html>
