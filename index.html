<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuestionario</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fb, #e8eef8);
      color: #1d2a3a;
    }

    .app {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 24px;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .intro {
      margin-bottom: 20px;
    }

    .section-title {
      margin: 30px 0 15px;
      padding-bottom: 8px;
      border-bottom: 2px solid #dce6f5;
      color: #204b84;
    }

    .question-box {
      background: #f9fbff;
      border: 1px solid #dbe7f7;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .question-text {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .options {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .options label {
      background: #fff;
      border: 1px solid #cfdcf0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .options label:hover {
      background: #eef5ff;
    }

    .matching-item {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: center;
      margin-bottom: 12px;
      background: #fff;
      border: 1px solid #d7e3f4;
      border-radius: 12px;
      padding: 14px;
    }

    .matching-left {
      font-weight: bold;
      font-size: 16px;
    }

    select {
      width: 100%;
      padding: 11px 12px;
      font-size: 15px;
      border-radius: 10px;
      border: 1px solid #bccce4;
      background: #fff;
    }

    .btn-bar {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 13px 22px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: #1f5ea8;
      color: white;
    }

    .btn-primary:hover {
      background: #174b86;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #e8eef8;
      color: #23415f;
    }

    .btn-secondary:hover {
      background: #d9e5f5;
    }

    .hidden {
      display: none;
    }

    .result-screen {
      min-height: 70vh;
      animation: fadeSlide 0.8s ease;
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .score-panel {
      text-align: center;
      padding: 30px 20px;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #1f5ea8, #3f82d1);
      color: white;
      border-radius: 18px;
      position: relative;
      overflow: hidden;
    }

    .score-panel::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      top: -60px;
      right: -40px;
    }

    .score-title {
      font-size: 20px;
      margin-bottom: 10px;
      opacity: 0.95;
    }

    .score-value {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 10px;
      animation: popIn 0.6s ease;
    }

    .score-extra {
      font-size: 18px;
      opacity: 0.95;
    }

    @keyframes popIn {
      0% {
        transform: scale(0.7);
        opacity: 0;
      }
      70% {
        transform: scale(1.08);
        opacity: 1;
      }
      100% {
        transform: scale(1);
      }
    }

    .details-title {
      margin: 0 0 18px;
      color: #204b84;
    }

    .detail-card {
      border: 1px solid #dde6f3;
      border-radius: 14px;
      background: #fff;
      padding: 16px;
      margin-bottom: 14px;
    }

    .detail-card.correct {
      border-left: 8px solid #1fa85b;
    }

    .detail-card.incorrect {
      border-left: 8px solid #d73838;
    }

    .detail-question {
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .detail-row {
      margin: 7px 0;
      line-height: 1.5;
    }

    .answer-correct {
      color: #148545;
      font-weight: bold;
    }

    .answer-incorrect {
      color: #c62828;
      font-weight: bold;
    }

    .muted {
      color: #5e6f84;
    }

    .small-note {
      margin-top: 8px;
      font-size: 14px;
      color: #6b7a8e;
    }

    @media (max-width: 700px) {
      .matching-item {
        grid-template-columns: 1fr;
      }

      .score-value {
        font-size: 38px;
      }

      .question-text {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="quizScreen" class="card">
      <div class="intro">
        <h1>Cuestionario</h1>
        <p class="muted">Respondé las preguntas y al final vas a ver tu resultado con el detalle completo.</p>
      </div>

      <div id="quizContent"></div>

      <div class="btn-bar">
        <button class="btn-primary" onclick="finalizarCuestionario()">Finalizar y corregir</button>
        <button class="btn-secondary" onclick="reiniciarRespuestas()">Borrar respuestas</button>
      </div>
    </div>

    <div id="resultScreen" class="card result-screen hidden">
      <div class="score-panel">
        <div class="score-title">Resultado final</div>
        <div id="scoreValue" class="score-value">0%</div>
        <div id="scoreExtra" class="score-extra">0 de 0 correctas</div>
      </div>

      <h2 class="details-title">Detalle de respuestas</h2>
      <div id="detailsContainer"></div>

      <div class="btn-bar">
        <button class="btn-primary" onclick="volverAlCuestionario()">Volver al cuestionario</button>
      </div>
    </div>
  </div>

  <script>
    /*
      ============================================================
      ACA CARGAS TUS PREGUNTAS DE FORMA SENCILLA
      ============================================================
    */
    const cuestionario = {
      verdaderoFalso: [
        {
          pregunta: "Montevideo es la capital de Uruguay.",
          correcta: true
        },
        {
          pregunta: "La Biblia tiene 100 libros.",
          correcta: false
        },
        {
          pregunta: "Jesús nació en Belén.",
          correcta: true
        }
      ],
      emparejamiento: [
        {
          titulo: "Emparejá cada país con su capital",
          pares: [
            { izquierda: "Uruguay", correcta: "Montevideo" },
            { izquierda: "Argentina", correcta: "Buenos Aires" },
            { izquierda: "Chile", correcta: "Santiago" }
          ],
          opciones: ["Montevideo", "Buenos Aires", "Santiago", "Lima"]
        },
        {
          titulo: "Emparejá cada personaje con su historia",
          pares: [
            { izquierda: "Noé", correcta: "Arca" },
            { izquierda: "David", correcta: "Goliat" },
            { izquierda: "Jonás", correcta: "Gran pez" }
          ],
          opciones: ["Arca", "Goliat", "Gran pez", "Egipto"]
        }
      ]
    };

    const quizContent = document.getElementById("quizContent");
    const quizScreen = document.getElementById("quizScreen");
    const resultScreen = document.getElementById("resultScreen");
    const scoreValue = document.getElementById("scoreValue");
    const scoreExtra = document.getElementById("scoreExtra");
    const detailsContainer = document.getElementById("detailsContainer");

    function renderizarCuestionario() {
      quizContent.innerHTML = "";

      if (cuestionario.verdaderoFalso.length > 0) {
        const title = document.createElement("h2");
        title.className = "section-title";
        title.textContent = "Verdadero o Falso";
        quizContent.appendChild(title);

        cuestionario.verdaderoFalso.forEach((item, index) => {
          const box = document.createElement("div");
          box.className = "question-box";

          box.innerHTML = `
            <div class="question-text">${index + 1}. ${item.pregunta}</div>
            <div class="options">
              <label>
                <input type="radio" name="vf_${index}" value="true">
                Verdadero
              </label>
              <label>
                <input type="radio" name="vf_${index}" value="false">
                Falso
              </label>
            </div>
          `;

          quizContent.appendChild(box);
        });
      }

      if (cuestionario.emparejamiento.length > 0) {
        const title = document.createElement("h2");
        title.className = "section-title";
        title.textContent = "Emparejamiento";
        quizContent.appendChild(title);

        let bloqueBase = cuestionario.verdaderoFalso.length;

        cuestionario.emparejamiento.forEach((bloque, bloqueIndex) => {
          const bloqueDiv = document.createElement("div");
          bloqueDiv.className = "question-box";

          let html = `<div class="question-text">${bloqueBase + bloqueIndex + 1}. ${bloque.titulo}</div>`;

          bloque.pares.forEach((par, parIndex) => {
            html += `
              <div class="matching-item">
                <div class="matching-left">${par.izquierda}</div>
                <div>
                  <select name="match_${bloqueIndex}_${parIndex}">
                    <option value="">Seleccionar...</option>
                    ${bloque.opciones.map(op => `<option value="${op}">${op}</option>`).join("")}
                  </select>
                </div>
              </div>
            `;
          });

          bloqueDiv.innerHTML = html;
          quizContent.appendChild(bloqueDiv);
        });
      }
    }

    function finalizarCuestionario() {
      let totalPreguntas = 0;
      let respuestasCorrectas = 0;
      let detalles = [];

      // Verdadero / Falso
      cuestionario.verdaderoFalso.forEach((item, index) => {
        totalPreguntas++;

        const seleccionada = document.querySelector(`input[name="vf_${index}"]:checked`);
        const valorSeleccionado = seleccionada ? seleccionada.value === "true" : null;
        const esCorrecta = valorSeleccionado === item.correcta;

        if (esCorrecta) respuestasCorrectas++;

        detalles.push({
          tipo: "vf",
          correcta: esCorrecta,
          pregunta: item.pregunta,
          elegida:
            valorSeleccionado === null
              ? "Sin responder"
              : valorSeleccionado ? "Verdadero" : "Falso",
          correctaTexto: item.correcta ? "Verdadero" : "Falso"
        });
      });

      // Emparejamiento
      cuestionario.emparejamiento.forEach((bloque) => {
        totalPreguntas++;

        let correctasBloque = 0;
        let totalPares = bloque.pares.length;
        let detallePares = [];

        bloque.pares.forEach((par, parIndex) => {
          const selector = document.querySelector(
            `select[name="match_${cuestionario.emparejamiento.indexOf(bloque)}_${parIndex}"]`
          );

          const elegida = selector ? selector.value : "";
          const estaBien = elegida === par.correcta;

          if (estaBien) correctasBloque++;

          detallePares.push({
            izquierda: par.izquierda,
            elegida: elegida || "Sin responder",
            correcta: par.correcta,
            estado: estaBien
          });
        });

        const bloqueCorrecto = correctasBloque === totalPares;
        if (bloqueCorrecto) respuestasCorrectas++;

        detalles.push({
          tipo: "match",
          correcta: bloqueCorrecto,
          pregunta: bloque.titulo,
          correctasBloque,
          totalPares,
          pares: detallePares
        });
      });

      mostrarResultado(respuestasCorrectas, totalPreguntas, detalles);
    }

    function mostrarResultado(correctas, total, detalles) {
      const porcentaje = total > 0 ? Math.round((correctas / total) * 100) : 0;

      scoreValue.textContent = `${porcentaje}%`;
      scoreExtra.textContent = `${correctas} de ${total} correctas`;

      detailsContainer.innerHTML = "";

      detalles.forEach((detalle, index) => {
        const card = document.createElement("div");
        card.className = `detail-card ${detalle.correcta ? "correct" : "incorrect"}`;

        if (detalle.tipo === "vf") {
          card.innerHTML = `
            <div class="detail-question">${index + 1}. ${detalle.pregunta}</div>
            <div class="detail-row">
              Tu respuesta:
              <span class="${detalle.correcta ? "answer-correct" : "answer-incorrect"}">
                ${detalle.elegida}
              </span>
            </div>
            <div class="detail-row">
              Respuesta correcta:
              <span class="muted">${detalle.correctaTexto}</span>
            </div>
          `;
        }

        if (detalle.tipo === "match") {
          let paresHtml = detalle.pares.map(par => `
            <div class="detail-row">
              <strong>${par.izquierda}</strong> →
              <span class="${par.estado ? "answer-correct" : "answer-incorrect"}">${par.elegida}</span>
              ${par.estado ? "" : `<span class="muted"> | Correcta: ${par.correcta}</span>`}
            </div>
          `).join("");

          card.innerHTML = `
            <div class="detail-question">${index + 1}. ${detalle.pregunta}</div>
            <div class="detail-row">
              Resultado del bloque:
              <span class="${detalle.correcta ? "answer-correct" : "answer-incorrect"}">
                ${detalle.correctasBloque} de ${detalle.totalPares} emparejamientos correctos
              </span>
            </div>
            <div class="small-note">Detalle:</div>
            ${paresHtml}
          `;
        }

        detailsContainer.appendChild(card);
      });

      quizScreen.classList.add("hidden");
      resultScreen.classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function volverAlCuestionario() {
      resultScreen.classList.add("hidden");
      quizScreen.classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function reiniciarRespuestas() {
      document.querySelectorAll('input[type="radio"]').forEach(input => {
        input.checked = false;
      });

      document.querySelectorAll('select').forEach(select => {
        select.value = "";
      });
    }

    renderizarCuestionario();
  </script>
</body>
</html>
